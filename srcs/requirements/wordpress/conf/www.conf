; =============================================================================
; php-fpm プール設定ファイル (www.conf)
; /etc/php83/php-fpm.d/www.conf に配置することで php-fpm に読み込まれる
; =============================================================================

; プール名 (複数プールがある場合の識別子)
[www]

; php-fpm プロセスを実行するユーザーとグループ
; Alpine Linux のデフォルトの web サーバーユーザー
user  = nobody
group = nobody

; php-fpm がリッスンするアドレスとポート
; 0.0.0.0:9000 でリッスンすることで Docker ネットワーク内から nginx がアクセスできる
; ※ Unix ソケットではなく TCP ポートを使用することで異なるコンテナから通信可能
listen = 9000

; プロセス管理方式 (dynamic: 需要に応じてプロセス数を自動調整)
pm = dynamic

; 同時に処理できる最大リクエスト数 (子プロセスの最大数)
pm.max_children = 5

; 起動時に生成する子プロセスの数
pm.start_servers = 2

; アイドル状態の子プロセスの最小数 (これを下回ると新しいプロセスを生成する)
pm.min_spare_servers = 1

; アイドル状態の子プロセスの最大数 (これを超えると余剰プロセスを終了する)
pm.max_spare_servers = 3
