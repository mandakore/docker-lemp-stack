# =============================================================================
# Nginx 設定ファイル (default.conf)
# Alpine の nginx は /etc/nginx/http.d/ 以下の *.conf を自動で読み込む
#
# 役割:
#   - ポート 443 で HTTPS リクエストを受け付ける
#   - TLSv1.2 / TLSv1.3 のみ許可（要件）
#   - PHP ファイルを WordPress コンテナ（php-fpm:9000）に転送する
# =============================================================================

server {
    # HTTPS のみリッスン（HTTP の 80 番は公開しない）
    listen      443 ssl;
    # IPv6 でも同じ設定で待ち受ける
    listen      [::]:443 ssl;

    # このサーバーが応答するドメイン名
    server_name atashiro.42.fr;

    # -----------------------------------------------------------------------
    # TLS 設定
    # -----------------------------------------------------------------------

    # 自己署名証明書と秘密鍵のパス（Dockerfile の openssl コマンドで生成）
    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    # 許可する TLS プロトコルバージョン（要件: TLSv1.2 または TLSv1.3 のみ）
    # TLSv1.0 と TLSv1.1 は脆弱性があるため使用禁止
    ssl_protocols TLSv1.2 TLSv1.3;

    # 暗号スイート: 強力なものを優先して使用
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;

    # -----------------------------------------------------------------------
    # WordPress ファイル配信設定
    # -----------------------------------------------------------------------

    # WordPress ファイル（PHP・静的ファイル）のルートディレクトリ
    # wordpress コンテナと同じ Named Volume をマウントして共有する
    root  /var/www/html;

    # デフォルトのインデックスファイル名
    index index.php;

    # 全リクエストのハンドリング
    location / {
        # try_files: 指定した順でファイルの存在を確認する
        # $uri:      リクエストされたパスがファイルとして存在するか
        # $uri/:     リクエストされたパスがディレクトリとして存在するか
        # /index.php?$args: 上記で見つからなければ WordPress の index.php に渡す
        try_files $uri $uri/ /index.php?$args;
    }

    # PHP ファイルのリクエストを FastCGI（php-fpm）に転送する
    location ~ \.php$ {
        # wordpress: Docker ネットワーク内のサービス名（DNS解決される）
        # 9000: php-fpm がリッスンするポート
        fastcgi_pass  wordpress:9000;

        # FastCGI のデフォルトパラメータを読み込む
        include       fastcgi_params;

        # 実行する PHP スクリプトのフルパスを php-fpm に伝える
        # $document_root: root ディレクティブで設定したパス
        # $fastcgi_script_name: リクエストされた PHP ファイル名
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;

        # FastCGI サーバーへの接続タイムアウト（秒）
        fastcgi_read_timeout 300;
    }

    # 静的ファイル（画像・CSS・JS）のキャッシュ設定
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2)$ {
        # ブラウザキャッシュを30日間有効にする
        expires 30d;
        # キャッシュを public として許可
        add_header Cache-Control "public";
    }

    # -----------------------------------------------------------------------
    # ボーナスパート: 静的ウェブサイトルーティング
    # -----------------------------------------------------------------------
    
    # /bonus へのアクセスを website コンテナにリバースプロキシする
    location ^~ /bonus/ {
        # ネットワーク内の website コンテナの 80 番ポートへ転送
        proxy_pass http://website:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
